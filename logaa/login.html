<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCodeKit - Professional Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <div class="form-header">
        <div class="brand-icon">
            <i class="fas fa-layer-group"></i>
        </div>
        <div class="brand-text">WebCodeKit</div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="form-section active" id="signinSection">
        <div class="msg error" id="siErr"></div>
        <div class="msg success" id="siOk"></div>
        <form id="signinForm">
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="siEmail" placeholder="Email Address" required>
            </div>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="siPass" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
    </div>

    <div class="form-section" id="signupSection">
        <div class="msg error" id="suErr"></div>
        <div class="msg success" id="suOk"></div>
        <form id="signupForm">
            <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" id="suName" placeholder="Full Name">
            </div>
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="suEmail" placeholder="Email Address">
            </div>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="suPass" placeholder="Password">
            </div>
            <div class="input-field">
                <i class="fas fa-check-double"></i>
                <input type="password" id="suConfirm" placeholder="Confirm Password">
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
